services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tenta
      POSTGRES_USER: tenta
      POSTGRES_PASSWORD: tenta
    ports:
      - "5432:5432"
    volumes:
      - tenta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenta -d tenta"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tenta_postgres_data:
