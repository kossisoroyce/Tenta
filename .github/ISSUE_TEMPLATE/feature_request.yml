name: Feature request
description: Propose a capability, workload, API, dashboard view, or integration.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Keep proposals focused on safe, auditable decision infrastructure. Avoid sharing sensitive operational details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, operator, or developer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Tenta do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime engine
        - HTTP API
        - CLI
        - Dashboard
        - Workloads
        - Storage / database provisioning
        - Audit / governance
        - SDK / integrations
        - Docs / packaging
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and audit considerations
      description: How should this be governed, logged, rolled back, or validated?
    validations:
      required: false
